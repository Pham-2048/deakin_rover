# Camera configuration
#
# MOCK MODE (Orange Pi, no cameras): Publishes color-coded test patterns.
# HARDWARE UPGRADE (Jetson/RPi with USB cameras):
#   1. Set use_mock to false
#   2. Find your camera devices: v4l2-ctl --list-devices
#   3. Update camera_devices with correct /dev/videoN paths
#   4. USB cameras often use even-numbered devices (video0, video2, video4)

camera_node:
  ros__parameters:
    use_mock: true            # Set to false on real rover with cameras

    # Camera device paths (for real cameras)
    # HARDWARE UPGRADE: Update these to match your USB camera device paths
    camera_devices:
      - "/dev/video0"         # Front camera
      - "/dev/video2"         # Rear camera
      - "/dev/video4"         # Arm camera

    # Camera topic name prefixes (must match GUI DEFAULT_CAMERAS)
    camera_names:
      - "camera1"             # → /camera1/image_raw (Front)
      - "camera2"             # → /camera2/image_raw (Rear)
      - "camera3"             # → /camera3/image_raw (Arm)

    # Capture settings
    frame_rate: 15.0          # FPS per camera
    resolution_width: 640     # pixels
    resolution_height: 480    # pixels
