# Drivetrain parameters for 6-wheel skid steer
#
# HARDWARE UPGRADE: Measure the real rover and update these values.
# wheel_separation = distance between left and right wheel centers
# wheel_radius = radius of the drive wheels
# gear_ratio = motor shaft RPM / wheel RPM (if geared)

drive_node:
  ros__parameters:
    wheel_separation: 0.5     # meters — measure between left/right wheel centers
    wheel_radius: 0.1         # meters — measure wheel radius
    max_linear_speed: 1.0     # m/s — maximum forward speed
    max_angular_speed: 2.0    # rad/s — maximum turn rate
    max_rpm: 3000             # BLD-3055 max RPM
    cmd_vel_timeout_sec: 0.5  # seconds — zero motors if no cmd_vel
    gear_ratio: 1.0           # motor:wheel ratio (1.0 = direct drive)
