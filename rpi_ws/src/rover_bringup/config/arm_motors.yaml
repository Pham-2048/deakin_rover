# Arm motor configuration for 6-DOF arm
# Matches Steadywin GIM motors with MIT Mini Cheetah protocol
#
# HARDWARE UPGRADE: Verify CAN IDs match your physical wiring.
# Use candump can0 to check which IDs respond.

motors:
  - id: 1
    name: base_yaw
    type: GIM4305-10
    can_id: 0x01
    position_min: -3.14    # rad
    position_max: 3.14
    velocity_max: 10.0     # rad/s
    torque_max: 1.2        # Nm
    kp_default: 20.0
    kd_default: 1.0

  - id: 2
    name: shoulder_pitch
    type: GIM8108-48
    can_id: 0x02
    position_min: -1.57
    position_max: 1.57
    velocity_max: 5.0
    torque_max: 12.0
    kp_default: 50.0
    kd_default: 5.0

  - id: 3
    name: elbow_pitch
    type: GIM8108-48
    can_id: 0x03
    position_min: -2.35
    position_max: 2.35
    velocity_max: 5.0
    torque_max: 12.0
    kp_default: 50.0
    kd_default: 5.0

  - id: 4
    name: wrist_roll
    type: GIM4310-36
    can_id: 0x04
    position_min: -3.14
    position_max: 3.14
    velocity_max: 8.0
    torque_max: 3.6
    kp_default: 15.0
    kd_default: 1.0

  - id: 5
    name: wrist_pitch
    type: GIM4310-36
    can_id: 0x05
    position_min: -1.57
    position_max: 1.57
    velocity_max: 8.0
    torque_max: 3.6
    kp_default: 15.0
    kd_default: 1.0

  - id: 6
    name: gripper
    type: GIM4305-10
    can_id: 0x06
    position_min: 0.0
    position_max: 1.57
    velocity_max: 10.0
    torque_max: 1.2
    kp_default: 20.0
    kd_default: 1.0
