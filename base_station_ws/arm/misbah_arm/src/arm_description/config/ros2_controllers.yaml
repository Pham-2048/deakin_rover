controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # Broadcasts /joint_states so RViz and MoveIt can see joint positions
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Accepts trajectory goals from MoveIt and executes them
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - base_joint
      - shoulder_joint
      - elbow_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    open_loop_control: true
    allow_nonzero_velocity_at_trajectory_end: false